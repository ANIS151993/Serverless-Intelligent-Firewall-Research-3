# SIF Client Dashboard Nginx — VM201 (sif-client-host)
# Wildcard routing: {client-subdomain}.marcbd.site → per-client Docker container

# Client subdomain routing (populated dynamically by sif-client-route script)
# Each provisioned client gets a file in /etc/nginx/conf.d/sif-client-{id}.conf

server {
    listen 80 default_server;

    # Health / provisioner fallback
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Default: forward to provisioner API
    location / {
        proxy_pass         http://127.0.0.1:8500;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
