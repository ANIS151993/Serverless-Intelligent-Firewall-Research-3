<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">ASLF-OSINT Research-3 Architecture</title>
  <desc id="desc">Unique Research-3 architecture combining Research-1 and Research-2 with super control and tenant compact subsystems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f5ee"/>
      <stop offset="100%" stop-color="#ece5d8"/>
    </linearGradient>
    <linearGradient id="super" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17395c"/>
      <stop offset="100%" stop-color="#2d5f8d"/>
    </linearGradient>
    <linearGradient id="tenant" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#158f86"/>
    </linearGradient>
    <linearGradient id="intel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L12,5 z" fill="#55697f"/>
    </marker>
    <style>
      .title { font: 700 42px 'Merriweather', Georgia, serif; fill: #10253a; }
      .subtitle { font: 500 20px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #31485f; }
      .box-title { font: 700 22px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #ffffff; }
      .box-text { font: 500 16px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #eaf2fb; }
      .box-title-dark { font: 700 22px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #17395c; }
      .box-text-dark { font: 500 16px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #2e475f; }
      .small { font: 600 15px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #2e475f; }
      .label { font: 700 14px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #0f2235; letter-spacing: 1px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>
  <text x="70" y="80" class="title">ASLF-OSINT Research-3 System Architecture</text>
  <text x="70" y="116" class="subtitle">Combined lineage: Research-1 LSTM foundation + Research-2 cross-cloud hybrid layer + Research-3 autonomous super-tenant federation</text>

  <rect x="70" y="170" width="350" height="165" rx="18" fill="#ffffff" stroke="#b8c7d7" stroke-width="2"/>
  <text x="92" y="208" class="box-title-dark">Research-1 Foundation</text>
  <text x="92" y="238" class="box-text-dark">LSTM IDS baseline and</text>
  <text x="92" y="262" class="box-text-dark">serverless threat classification</text>
  <text x="92" y="286" class="box-text-dark">for initial policy confidence</text>

  <rect x="70" y="365" width="350" height="165" rx="18" fill="#ffffff" stroke="#b8c7d7" stroke-width="2"/>
  <text x="92" y="403" class="box-title-dark">Research-2 Expansion</text>
  <text x="92" y="433" class="box-text-dark">XGBoost + BiGRU hybrid scoring,</text>
  <text x="92" y="457" class="box-text-dark">cross-cloud adaptation and unified</text>
  <text x="92" y="481" class="box-text-dark">zero-trust control baseline</text>

  <rect x="70" y="560" width="350" height="150" rx="18" fill="url(#intel)"/>
  <text x="92" y="598" class="box-title">OSINT Aggregation</text>
  <text x="92" y="628" class="box-text">REST clients: MISP, OTX, VirusTotal</text>
  <text x="92" y="652" class="box-text">Indicator normalization and trust scoring</text>

  <rect x="485" y="235" width="420" height="255" rx="20" fill="#ffffff" stroke="#9fb3c9" stroke-width="2.5"/>
  <text x="515" y="277" class="box-title-dark">ASLF-OSINT Autonomous Learning Core</text>
  <text x="515" y="310" class="box-text-dark">PPO policy optimization</text>
  <text x="515" y="334" class="box-text-dark">Continual drift adaptation</text>
  <text x="515" y="358" class="box-text-dark">Few-shot meta-learning</text>
  <text x="515" y="382" class="box-text-dark">Transfer learning bridge</text>
  <text x="515" y="406" class="box-text-dark">FedNova federated aggregation</text>
  <text x="515" y="442" class="small">Composite risk -> Allow / Challenge / Block</text>

  <rect x="960" y="170" width="560" height="205" rx="20" fill="url(#super)"/>
  <text x="988" y="214" class="box-title">Super Control System (Provider)</text>
  <text x="988" y="248" class="box-text">Tenant account lifecycle and API credentials</text>
  <text x="988" y="272" class="box-text">Global policy/model bundle publication</text>
  <text x="988" y="296" class="box-text">Fleet telemetry analytics and upgrade governance</text>
  <text x="988" y="320" class="box-text">Real-time supervision across all client dashboards</text>

  <rect x="960" y="400" width="560" height="255" rx="20" fill="url(#tenant)"/>
  <text x="988" y="444" class="box-title">Tenant Compact Subsystems (Corporate Clients)</text>
  <text x="988" y="478" class="box-text">Local network + cloud asset onboarding</text>
  <text x="988" y="502" class="box-text">Local enforcement with reduced central dependency</text>
  <text x="988" y="526" class="box-text">Auto-sync of policy and platform upgrades</text>
  <text x="988" y="550" class="box-text">Tenant dashboard: traffic, threats, and response visibility</text>
  <text x="988" y="574" class="box-text">Continuous telemetry feedback to super control</text>

  <rect x="485" y="535" width="420" height="175" rx="20" fill="#ffffff" stroke="#9fb3c9" stroke-width="2"/>
  <text x="515" y="575" class="box-title-dark">Zero-Trust Response Mesh</text>
  <text x="515" y="607" class="box-text-dark">AWS Lambda | Azure Functions | GCP Functions</text>
  <text x="515" y="631" class="box-text-dark">Proxmox federation nodes and local services</text>
  <text x="515" y="655" class="box-text-dark">Identity-aware policy actuation + audit trail</text>

  <line x1="420" y1="252" x2="485" y2="292" stroke="#55697f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="420" y1="447" x2="485" y2="368" stroke="#55697f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="420" y1="635" x2="485" y2="430" stroke="#55697f" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="905" y1="320" x2="960" y2="272" stroke="#55697f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="905" y1="390" x2="960" y2="470" stroke="#55697f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="905" y1="600" x2="960" y2="560" stroke="#55697f" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="1240" y1="375" x2="1240" y2="400" stroke="#2d5f8d" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1240" y1="655" x2="1240" y2="170" stroke="#0f766e" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrow)"/>

  <text x="1260" y="520" class="label">SYNC + TELEMETRY FEEDBACK LOOP</text>

  <rect x="70" y="760" width="1450" height="140" rx="16" fill="#ffffff" stroke="#d0d9e3"/>
  <text x="96" y="802" class="box-title-dark">Research-3 Distinctive Outcome</text>
  <text x="96" y="832" class="box-text-dark">Provider-operated super control can manage many enterprises, while each enterprise keeps a tenant-local protective subsystem that remains active during control-plane disruption.</text>
  <text x="96" y="858" class="box-text-dark">This combines Research-1 detection foundations and Research-2 cross-cloud adaptation into a new autonomous, federated, and operationally scalable architecture.</text>
</svg>
